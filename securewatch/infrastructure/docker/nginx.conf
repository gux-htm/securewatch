# Nginx reverse proxy — TLS 1.3 only (Rule S6)
# Routes external traffic to internal services

worker_processes auto;

events {
  worker_connections 4096;
}

http {
  # TLS 1.3 only — Rule S6
  ssl_protocols TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=integration:10m rate=500r/s;

  # ── Integration Layer — port 443 /v1/events ──────────────────────────
  upstream integration_layer {
    server integration-layer.securewatch-integration.svc.cluster.local:3001;
    keepalive 32;
  }

  # ── REST API Gateway — port 443 /api ────────────────────────────────
  upstream rest_api {
    server rest-api.securewatch-frontend.svc.cluster.local:3000;
    keepalive 32;
  }

  # ── Admin Dashboard — port 443 / ────────────────────────────────────
  upstream dashboard {
    server dashboard.securewatch-frontend.svc.cluster.local:3010;
    keepalive 32;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/tls/tls.crt;
    ssl_certificate_key /etc/nginx/tls/tls.key;

    # Integration Layer
    location /v1/events {
      limit_req zone=integration burst=200 nodelay;
      proxy_pass http://integration_layer;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # REST API
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://rest_api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin Dashboard SPA
    location / {
      proxy_pass http://dashboard;
      proxy_set_header Host $host;
    }
  }

  # ── Emergency Read-Only View — port 8443 ────────────────────────────
  server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/tls/tls.crt;
    ssl_certificate_key /etc/nginx/tls/tls.key;

    location / {
      proxy_pass http://dashboard;
      proxy_set_header Host $host;
      proxy_set_header X-Emergency-View "true";
    }
  }

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }
}
