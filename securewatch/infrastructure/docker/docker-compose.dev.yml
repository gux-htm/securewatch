version: '3.9'

# Development environment — no secrets in this file (Rule S4)
# All service secrets come from Vault (vault service below)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: securewatch
      POSTGRES_USER: securewatch_app
      POSTGRES_PASSWORD: dev_password_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securewatch_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:2.13.0-pg16
    environment:
      POSTGRES_DB: securewatch_audit
      POSTGRES_USER: securewatch_app
      POSTGRES_PASSWORD: dev_password_only
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securewatch_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: securewatch-dev-cluster
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sw.events.session     --partitions 6 --replication-factor 1 --config retention.ms=2592000000 --config compression.type=lz4
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sw.events.resource    --partitions 6 --replication-factor 1 --config retention.ms=2592000000 --config compression.type=lz4
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sw.events.integration --partitions 3 --replication-factor 1 --config retention.ms=2592000000 --config compression.type=lz4
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sw.events.system      --partitions 3 --replication-factor 1 --config retention.ms=2592000000 --config compression.type=lz4
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic sw.alerts.outbound    --partitions 3 --replication-factor 1 --config retention.ms=2592000000 --config compression.type=lz4
      echo 'Kafka topics created.'
      "

  vault:
    image: hashicorp/vault:1.15
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-token-only
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: server -dev

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  kafka_data:
