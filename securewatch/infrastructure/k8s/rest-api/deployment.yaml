apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api
  namespace: securewatch-frontend
  labels:
    app: rest-api
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rest-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: rest-api
    spec:
      serviceAccountName: rest-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: rest-api
          image: ghcr.io/securewatch/rest-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: VAULT_ADDR
              valueFrom:
                secretKeyRef:
                  name: vault-config
                  key: addr
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rest-api
  namespace: securewatch-frontend
spec:
  selector:
    app: rest-api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rest-api-hpa
  namespace: securewatch-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rest-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
