---
# One-time Job to create all Kafka topics with exact config from master spec.
# Runs on first deploy. Safe to re-run (--if-not-exists).
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topic-init
  namespace: securewatch-data
  labels:
    app: kafka-topic-init
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-init
          image: confluentinc/cp-kafka:7.6.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              BROKERS="${KAFKA_BROKERS}"

              # sw.events.session — partition key: account_id — 30 day retention
              kafka-topics --bootstrap-server "${BROKERS}" \
                --create --if-not-exists \
                --topic sw.events.session \
                --partitions 6 \
                --replication-factor 3 \
                --config retention.ms=2592000000 \
                --config min.insync.replicas=2 \
                --config compression.type=lz4 \
                --config cleanup.policy=delete

              # sw.events.resource — partition key: resource_id
              kafka-topics --bootstrap-server "${BROKERS}" \
                --create --if-not-exists \
                --topic sw.events.resource \
                --partitions 6 \
                --replication-factor 3 \
                --config retention.ms=2592000000 \
                --config min.insync.replicas=2 \
                --config compression.type=lz4 \
                --config cleanup.policy=delete

              # sw.events.integration — partition key: system_id
              kafka-topics --bootstrap-server "${BROKERS}" \
                --create --if-not-exists \
                --topic sw.events.integration \
                --partitions 3 \
                --replication-factor 3 \
                --config retention.ms=2592000000 \
                --config min.insync.replicas=2 \
                --config compression.type=lz4 \
                --config cleanup.policy=delete

              # sw.events.system — partition key: tenant_id
              kafka-topics --bootstrap-server "${BROKERS}" \
                --create --if-not-exists \
                --topic sw.events.system \
                --partitions 3 \
                --replication-factor 3 \
                --config retention.ms=2592000000 \
                --config min.insync.replicas=2 \
                --config compression.type=lz4 \
                --config cleanup.policy=delete

              # sw.alerts.outbound — partition key: severity
              kafka-topics --bootstrap-server "${BROKERS}" \
                --create --if-not-exists \
                --topic sw.alerts.outbound \
                --partitions 3 \
                --replication-factor 3 \
                --config retention.ms=2592000000 \
                --config min.insync.replicas=2 \
                --config compression.type=lz4 \
                --config cleanup.policy=delete

              echo "All 5 Kafka topics created successfully."
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: kafka-config
                  key: brokers
