apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-layer
  namespace: securewatch-integration
  labels:
    app: integration-layer
    component: ingestion
spec:
  replicas: 2  # Active-active — zero downtime (TDD 3.6)
  selector:
    matchLabels:
      app: integration-layer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: integration-layer
    spec:
      serviceAccountName: integration-layer
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: integration-layer
          image: ghcr.io/securewatch/integration-layer:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: VAULT_ADDR
              valueFrom:
                secretKeyRef:
                  name: vault-config
                  key: addr
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-token
                  key: token
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: integration-layer
  namespace: securewatch-integration
spec:
  selector:
    app: integration-layer
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: integration-layer-hpa
  namespace: securewatch-integration
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: integration-layer
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
