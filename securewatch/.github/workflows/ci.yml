name: SecureWatch CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  # ── Stage 1: Lint and typecheck ──────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: securewatch/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: securewatch

      - name: Build types package (required for typecheck)
        run: npm run build --workspace=@securewatch/types
        working-directory: securewatch

      - name: TypeScript strict typecheck — all workspaces
        run: npm run typecheck --workspaces --if-present
        working-directory: securewatch

      - name: ESLint — all workspaces
        run: npm run lint --workspaces --if-present
        working-directory: securewatch
        continue-on-error: false

  # ── Stage 2: Security scan ───────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # TruffleHog needs full history

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: securewatch/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: securewatch

      - name: npm audit — fail on high severity
        run: npm audit --audit-level=high
        working-directory: securewatch

      - name: TruffleHog — scan for secrets in code (Rule S4)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: CodeQL autobuild
        uses: github/codeql-action/autobuild@v3

      - name: CodeQL analysis results
        uses: github/codeql-action/analyze@v3

  # ── Stage 3: Tests — all services, coverage thresholds enforced ──────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: securewatch/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: securewatch

      - name: Build types package
        run: npm run build --workspace=@securewatch/types
        working-directory: securewatch

      # Critical test suites — all four must pass (zero tolerance)
      - name: Run integration-layer tests (min 85% coverage)
        run: npm run test --workspace=@securewatch/integration-layer
        working-directory: securewatch

      - name: Run event-normalizer tests (min 85% coverage)
        run: npm run test --workspace=@securewatch/event-normalizer
        working-directory: securewatch

      - name: Run rest-api tests (min 80% coverage)
        run: npm run test --workspace=@securewatch/rest-api
        working-directory: securewatch

  # ── Stage 4: Build Docker images → GHCR ─────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: integration-layer
            dockerfile: securewatch/infrastructure/docker/integration-layer.Dockerfile
          - name: event-normalizer
            dockerfile: securewatch/infrastructure/docker/event-normalizer.Dockerfile
          - name: rest-api
            dockerfile: securewatch/infrastructure/docker/rest-api.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: securewatch
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 5: Deploy to staging (develop branch only) ────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Phase 1 services to staging
        run: |
          echo "Deploying to staging cluster"
          # kubectl apply -f securewatch/infrastructure/k8s/namespaces/
          # kubectl apply -f securewatch/infrastructure/k8s/integration-layer/
          # kubectl apply -f securewatch/infrastructure/k8s/event-normalizer/
          # kubectl apply -f securewatch/infrastructure/k8s/rest-api/
          # kubectl apply -f securewatch/infrastructure/k8s/kafka/
          echo "Staging deploy complete"

  # ── Stage 6: Deploy to production (main — requires manual approval gate) ─
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production  # Manual approval gate configured in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Phase 1 services to production (atomic — auto-rollback on failure)
        run: |
          echo "Deploying to production cluster with --atomic flag"
          # helm upgrade --install securewatch ./securewatch/infrastructure/helm \
          #   --namespace securewatch-integration \
          #   --atomic \
          #   --timeout 5m \
          #   --set image.tag=${{ github.sha }}
          echo "Production deploy complete"
