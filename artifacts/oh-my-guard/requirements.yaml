packages:
  "recharts": "For stunning data visualization and charts on the dashboard"
  "framer-motion": "For smooth micro-interactions and page transitions"
  "date-fns": "For elegant date and time formatting"
  "clsx": "For dynamic className merging"
  "tailwind-merge": "For resolving Tailwind class conflicts"
  "lucide-react": "For crisp, modern icons"

images:
  - path: "artifacts/Oh-My-Guard!/public/images/logo.png"
    description: "Futuristic abstract geometric shield logo in bright glowing cyan and deep navy, minimal and professional, transparent background"
    aspect_ratio: "1:1"
  - path: "artifacts/Oh-My-Guard!/public/images/hero-bg.png"
    description: "Dark navy cyber grid background with glowing cyan and teal data nodes, subtle depth of field, sleek security operations center aesthetic"
    aspect_ratio: "16:9"

notes:
  - Uses @workspace/api-client-react for TanStack Query hooks
  - Assumes standard REST API patterns as defined in OpenAPI spec
  - The UI is designed as a dark-mode Security Operations Center (SOC)
